<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8' />
<link rel='stylesheet' href='https://realdrberg-my.sharepoint.com/personal/eder_santana_drberg_com/Documents/Calendar/skeleton.css' />
<link rel='stylesheet' href='https://realdrberg-my.sharepoint.com/personal/eder_santana_drberg_com/Documents/Calendar/theme.css' />
<link rel='stylesheet' href='https://realdrberg-my.sharepoint.com/personal/eder_santana_drberg_com/Documents/Calendar/palette.css' />
<script src='https://realdrberg-my.sharepoint.com/personal/eder_santana_drberg_com/Documents/Calendar/fullcalendar.global.js'></script>
<script src='https://realdrberg-my.sharepoint.com/personal/eder_santana_drberg_com/Documents/Calendar/global.js'></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,timeGridDay'
      },
      initialDate: '2023-01-12',
      navLinks: true,
      selectable: true,
      selectMirror: true,
      select: function(info) {
        var title = prompt('Event Title:');
        if (title) {
          calendar.addEvent({
            title: title,
            start: info.start,
            end: info.end,
            allDay: info.allDay
          })
        }
        calendar.unselect()
      },
      eventClick: function(info) {
        openEventModal(info.event);
      },
      editable: true,
      dayMaxEvents: true,
      events: [
        {
          title: 'Test Event AAA',
          start: '2026-07-23',
          end: '2026-07-23',
          description: 'Test event AAA description'
        },        {
          title: 'Test Event BBB',
          start: '2026-07-31',
          end: '2026-07-31',
          description: 'Test event BBB description '
        },        {
          title: 'Test Event CCC',
          start: '2026-07-03',
          end: '2026-07-03',
          description: 'Test event CCC'
        }
      ]
    });
    calendar.render();
  });

  function openEventModal(event) {
    const modal = document.getElementById('eventModal');
    const modalContent = document.getElementById('modalContent');
    
    // Formatar datas
    const startDate = event.start ? new Date(event.start).toLocaleString('pt-BR') : 'Não definido';
    const endDate = event.end ? new Date(event.end).toLocaleString('pt-BR') : 'Não definido';
    
    // Montar conteúdo do modal
    let content = `
      <h2>${event.title}</h2>
      <div class="event-details">
        <p><strong>Start Date:</strong> ${startDate}</p>
        <p><strong>End Date:</strong> ${endDate}</p>
        <p><strong>Description:</strong> ${event.extendedProps.description || 'No description'}</p>
    `;
    
    if (event.url) {
      content += `<p><a href="${event.url}" target="_blank" class="event-link">Open link</a></p>`;
    }
    
    content += `
      <div class="modal-actions">
        <!--<button class="btn-delete" onclick="deleteEvent('${event.id}')">Delete Event</button>-->
        <button class="btn-close" onclick="closeEventModal()">Close</button>
      </div>
      </div>
    `;
    
    modalContent.innerHTML = content;
    modal.style.display = 'flex';
  }

  function closeEventModal() {
    const modal = document.getElementById('eventModal');
    modal.style.display = 'none';
  }

  function deleteEvent(eventId) {
    if (confirm('Tem certeza que deseja deletar este evento?')) {
      const calendarEl = document.getElementById('calendar');
      const calendar = FullCalendar.getCalendarById(calendarEl);
      const event = calendar.getEventById(eventId);
      if (event) {
        event.remove();
        closeEventModal();
      }
    }
  }

  // Fechar modal ao clicar fora dele
  window.onclick = function(event) {
    const modal = document.getElementById('eventModal');
    if (event.target === modal) {
      modal.style.display = 'none';
    }
  }
</script>
<style>
  body {
    margin: 40px 10px;
    padding: 0;
    font-family: Arial, Helvetica Neue, Helvetica, sans-serif;
    font-size: 14px;
  }
  #calendar {
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Estilos do Modal */
  #eventModal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    align-items: center;
    justify-content: center;
  }

  #modalContent {
    background-color: #fff;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    max-width: 500px;
    width: 90%;
    animation: slideIn 0.3s ease-out;
  }

  @keyframes slideIn {
    from {
      transform: translateY(-50px);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  #modalContent h2 {
    margin-top: 0;
    color: #333;
    border-bottom: 2px solid #007bff;
    padding-bottom: 10px;
  }

  .event-details {
    margin: 20px 0;
  }

  .event-details p {
    margin: 10px 0;
    line-height: 1.6;
  }

  .event-details strong {
    color: #555;
  }

  .event-link {
    color: #007bff;
    text-decoration: none;
    font-weight: bold;
  }

  .event-link:hover {
    text-decoration: underline;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  .btn-delete, .btn-close {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: background-color 0.3s;
  }

  .btn-delete {
    background-color: #dc3545;
    color: white;
  }

  .btn-delete:hover {
    background-color: #c82333;
  }

  .btn-close {
    background-color: #6c757d;
    color: white;
  }

  .btn-close:hover {
    background-color: #5a6268;
  }

  /* Cursor pointer nos eventos */
  .fc-event {
    cursor: pointer;
  }
</style>
</head>
<body>
  <div id='calendar'></div>
  
  <!-- Modal para exibir detalhes do evento -->
  <div id='eventModal'>
    <div id='modalContent'></div>
  </div>
</body>
</html>
