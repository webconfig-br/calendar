<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8' />

<link rel='stylesheet' href='https://raw.githubusercontent.com/webconfig-br/calendar/main/skeleton.css' />
<link rel='stylesheet' href='https://raw.githubusercontent.com/webconfig-br/calendar/main/theme.css' />
<link rel='stylesheet' href='https://raw.githubusercontent.com/webconfig-br/calendar/main/palette.css' />

<link
  href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.css"
  rel="stylesheet"
/>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.19/index.global.min.js"></script>
<script>

  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridYear,dayGridMonth,timeGridWeek'
      },
      initialView: 'dayGridYear',
      initialDate: '2023-01-12',
      editable: true,
      selectable: true,
      dayMaxEvents: true, // allow "more" link when too many events
      // businessHours: true,
      // weekends: false,
      events: [
        {
          title: 'Evento teste AAA',
          start: '2026-07-16',
          end: '2026-07-17',
          description: 'Testando evento de um dia pro outro'
        },        {
          title: 'Evento teste BBB',
          start: '2026-07-16',
          end: '2026-07-16',
          description: 'Teste de evento terminando no mesmo dia'
        },        {
          title: 'Evento teste CCC',
          start: '2026-07-16',
          end: '2026-07-20',
          description: 'Evento teste com maior duração'
        },        {
          title: 'Test AAA',
          start: '2026-07-16',
          end: '2026-07-23',
          description: 'AAA'
        },        {
          title: 'Test BBB',
          start: '2026-07-24',
          end: '2026-07-24',
          description: 'Testing AAA'
        },        {
          title: 'Test CCC',
          start: '2026-07-25',
          end: '2026-07-27',
          description: 'AAA'
        }
      ]
    });

    calendar.render();
  });

</script>
<style>

  body {
    margin: 40px 10px;
    padding: 0;
    font-family: Arial, Helvetica Neue, Helvetica, sans-serif;
    font-size: 14px;
  }

  #calendar {
    max-width: 1200px;
    margin: 0 auto;
  }

</style>
</head>
<body>

  <div id='calendar'></div>

</body>
</html>
